name: my-app
version: 1.0.0
type: static
source:
  path: ./src
  build_command: "npm run build"
artifacts:
  base_path: ./dist
  include: ["*"]
  exclude: ["*.log"]
environments:
  production:
    target_path: /var/www/html
    strategy: backup
    variables:
      DB_HOST: "prod-db"
pipeline:
  health_check: "http://localhost:8080/health"
