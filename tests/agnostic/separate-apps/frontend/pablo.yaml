name: react-frontend
version: 2.0.0

credentials:
  prod_server:
    type: ssh
    username: deploy
    key: ~/.ssh/id_rsa

profiles:
  default:
    type: static
    
    hooks:
      pre: npm test
      post: echo 'Frontend deployed!'
    
    environments:
      development:
        build:
          command: npm run build
          path: ./
          variables:
            API_URL: http://localhost:3000
            ENV: development
        
        deploy:
          source:
            dir: ./dist
            include: ["**/*"]
            exclude: ["*.map", "*.log"]
          target_path: /var/www/dev
          strategy: overwrite
      
      production:
        build:
          command: npm run build
          path: ./
          variables:
            API_URL: https://api.example.com
            ENV: production
        
        remote:
          method: ssh
          host: 192.168.1.100
          credential: prod_server
        
        deploy:
          source:
            dir: ./dist
            include: ["**/*"]
            exclude: ["*.map", "*.log"]
          target_path: /var/www/html
          strategy: backup
    
    pipeline:
      health_check: http://localhost/health
      on_success: echo 'Deployment successful!'
