name: go-microservice-local
version: 3.2.1

profiles:
  default:
    type: binary
    
    hooks:
      pre: go test ./...
      post: echo 'Service deployed!'
    
    environments:
      development:
        build:
          command: go build -ldflags="-s -w" -o myservice ./cmd/server
          path: ./
        
        deploy:
          source:
            dir: ./
            include: ["myservice"]
          target_path: ./dist/dev
          strategy: backup
          service:
            type: systemd
            name: myservice-dev
            restart: true
        
        register_path:
          scope: user
      
      production:
        build:
          command: go build -ldflags="-s -w" -o myservice ./cmd/server
          path: ./
        
        deploy:
          source:
            dir: ./
            include: ["myservice"]
          target_path: ./dist/prod
          strategy: backup
          service:
            type: systemd
            name: myservice
            restart: true
        
        register_path:
          scope: system
    
    pipeline:
      health_check: http://localhost:9090/health
